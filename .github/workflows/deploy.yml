name: 'Deploy'

on:
  push:
    branches:
      - main
      - beta

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Determine Version
        id: determine_version
        run: |
          pnpm install --frozen-lockfile
          VERSION="$(pnpm exec release-it --release-version)"
          TAG_NAME="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tagName=$TAG_NAME" >> "$GITHUB_OUTPUT"
      - name: Validate Version Outputs
        run: |
          if [ -z "${{ steps.determine_version.outputs.version }}" ] || [ -z "${{ steps.determine_version.outputs.tagName }}" ]; then
            echo "No new release version was produced (likely already released)."
            exit 1
          fi
    outputs:
      version: ${{ steps.determine_version.outputs.version }}
      tagName: ${{ steps.determine_version.outputs.tagName }}

  build_win:
    needs: [version]
    runs-on: ubuntu-latest
    container:
      image: electronuserland/builder:wine
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Build
        run: |
          pnpm install --frozen-lockfile --config.platform=win32
          pnpm run build
          pnpm exec electron-builder \
            --win nsis portable \
            --config.extraMetadata.version="$VERSION" \
            --config.nsis.artifactName="OscGoesBrrr-setup-${VERSION}.exe" \
            --config.portable.artifactName="OscGoesBrrr-portable-${VERSION}.exe"
        env:
          HOME: /root
          VERSION: ${{ needs.version.outputs.version }}
      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: |
            dist/OscGoesBrrr-setup-${{ needs.version.outputs.version }}.exe
            dist/OscGoesBrrr-portable-${{ needs.version.outputs.version }}.exe

  build_linux:
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install rpm build tools
        run: sudo apt-get update && sudo apt-get install -y rpm
      - name: Build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          pnpm exec electron-builder \
            --linux AppImage rpm \
            --config.extraMetadata.version="$VERSION"
        env:
          VERSION: ${{ needs.version.outputs.version }}
      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: |
            dist/OscGoesBrrr-${{ needs.version.outputs.version }}.AppImage
            dist/OscGoesBrrr-${{ needs.version.outputs.version }}.rpm

  release:
    needs: [version, build_win, build_linux]
    runs-on: ubuntu-latest
    outputs:
      assets: ${{ steps.release.outputs.assets }}
    steps:
      - name: Fail If Tag Already Exists
        env:
          TAG_NAME: ${{ needs.version.outputs.tagName }}
        run: |
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --tags --refs "$REPO_URL" "refs/tags/${TAG_NAME}" | grep -q .; then
            echo "Tag ${TAG_NAME} already exists on origin."
            exit 1
          fi
      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows
          path: windows
      - name: Download Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: linux
          path: linux
      - name: Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tagName }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ needs.version.outputs.version }}
          prerelease: ${{ github.ref_name != github.event.repository.default_branch }}
          files: |
            windows/OscGoesBrrr-setup-${{ needs.version.outputs.version }}.exe
            windows/OscGoesBrrr-portable-${{ needs.version.outputs.version }}.exe
            linux/OscGoesBrrr-${{ needs.version.outputs.version }}.AppImage
            linux/OscGoesBrrr-${{ needs.version.outputs.version }}.rpm

  update_manifest:
    needs: [version, release]
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout version manifest
        uses: actions/checkout@v6
        with:
          repository: OSCToys/ogb-updater-manifest
          ssh-key: ${{ secrets.VERSION_DEPLOY_KEY }}
      - uses: actions/setup-node@v6
        with:
          # Can't use .nvmrc because we don't clone the repo for this job
          node-version: 24
      - name: Update Version Manifest
        run: |
          jq \
            --arg v "$VERSION" \
            --arg ws "$WINDOWS_SETUP_URL" \
            --arg wp "$WINDOWS_PORTABLE_URL" \
            --arg la "$LINUX_APPIMAGE_URL" \
            --arg lr "$LINUX_RPM_URL" \
            '.latestVersion = $v
             | .latestInstaller = $ws
             | .downloadUrls = ((.downloadUrls // {}) + {
                 windowsSetup: $ws,
                 windowsPortable: $wp,
                 linuxAppImage: $la,
                 linuxRpm: $lr
               })' updates.json > updates.json.tmp
          mv updates.json.tmp updates.json
        env:
          VERSION: ${{ needs.version.outputs.version }}
          WINDOWS_SETUP_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.tagName }}/OscGoesBrrr-setup-${{ needs.version.outputs.version }}.exe
          WINDOWS_PORTABLE_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.tagName }}/OscGoesBrrr-portable-${{ needs.version.outputs.version }}.exe
          LINUX_APPIMAGE_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.tagName }}/OscGoesBrrr-${{ needs.version.outputs.version }}.AppImage
          LINUX_RPM_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.tagName }}/OscGoesBrrr-${{ needs.version.outputs.version }}.rpm
      - name: Push version manifest
        run: |
          git diff
          git config user.name Releases
          git config user.email noreply@osc.toys
          git diff --quiet || git commit -am "Release from $GITHUB_SHA"
          git push
