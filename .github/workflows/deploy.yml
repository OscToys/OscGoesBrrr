name: 'Deploy'

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Determine Version
        id: determine_version
        run: |
          pnpm install --frozen-lockfile
          pnpm exec semantic-release --dry-run
      - name: Validate Version Outputs
        run: |
          if [ -z "${{ steps.determine_version.outputs.version }}" ] || [ -z "${{ steps.determine_version.outputs.tagName }}" ]; then
            echo "No new release version was produced (likely already released)."
            exit 1
          fi
    outputs:
      version: ${{ steps.determine_version.outputs.version }}
      tagName: ${{ steps.determine_version.outputs.tagName }}

  build_win:
    needs: [version]
    runs-on: ubuntu-latest
    container:
      image: electronuserland/builder:wine
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Build
        run: |
          pnpm install --frozen-lockfile --config.platform=win32
          (cd src/main && pnpm exec webpack)
          (cd src/frontend && pnpm exec webpack)
          pnpm exec electron-builder \
            --win nsis portable \
            --config.extraMetadata.version="$VERSION" \
            --config.nsis.artifactName="OscGoesBrrr-setup-${VERSION}.exe" \
            --config.portable.artifactName="OscGoesBrrr-portable-${VERSION}.exe"
        env:
          HOME: /root
          VERSION: ${{ needs.version.outputs.version }}
      - uses: actions/upload-artifact@v6
        with:
          name: windows
          path: |
            dist/OscGoesBrrr-setup-${{ needs.version.outputs.version }}.exe
            dist/OscGoesBrrr-portable-${{ needs.version.outputs.version }}.exe

  release:
    needs: [version, build_win]
    runs-on: ubuntu-latest
    outputs:
      assets: ${{ steps.release.outputs.assets }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: windows
          path: windows
      - name: Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tagName }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ needs.version.outputs.version }}
          prerelease: ${{ github.ref_name != github.event.repository.default_branch }}
          files: |
            windows/OscGoesBrrr-setup-${{ needs.version.outputs.version }}.exe
            windows/OscGoesBrrr-portable-${{ needs.version.outputs.version }}.exe

  update_manifest:
    needs: [version, release]
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          path: repo
      - name: Checkout version manifest
        uses: actions/checkout@v6
        with:
          path: versions
          repository: OSCToys/ogb-updater-manifest
          ssh-key: ${{ secrets.VERSION_DEPLOY_KEY }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Update Version Manifest
        run: |
          pushd versions
          jq --arg v "$VERSION" --arg u "$DOWNLOAD_URL" '.latestVersion = $v | .latestInstaller = $u' updates.json > updates.json.tmp
          mv updates.json.tmp updates.json
          popd
        env:
          VERSION: ${{ needs.version.outputs.version }}
          DOWNLOAD_URL: ${{ fromJSON(needs.release.outputs.assets)[0].browser_download_url }}
      - name: Push version manifest
        working-directory: versions
        run: |
          git diff
          git config user.name Releases
          git config user.email noreply@osc.toys
          git diff --quiet || git commit -am "Release from $GITHUB_SHA"
          git push
